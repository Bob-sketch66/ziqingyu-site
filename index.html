<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>子卿写作</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial;
      background: #f7f7f7;
      color: #333;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 80px auto;
      padding: 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #888;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      text-align: left;
    }

    .card h2 {
      margin-top: 0;
      font-size: 20px;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 10px;
    }

    .footer {
      margin-top: 40px;
      color: #999;
      font-size: 14px;
    }

    .highlight {
      color: #000;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>子卿写作</h1>
    <div class="subtitle">记录跨境电商与写作的思考</div>

    <div class="card">
      <h2>👋 关于我</h2>
      <p>
        美区 TikTok 跨境电商操盘手。<br>
        做过完整项目，从选品到内容到转化。<br><br>
        也在持续写作，记录一些真实经历和思考。
      </p>
    </div>

    <div class="card">
      <h2>🧠 我会分享什么</h2>
      <ul>
        <li>跨境电商（TikTok 实操经验）</li>
        <li>从0到1做项目的过程</li>
        <li>写作与表达</li>
        <li>个人成长的一些记录</li>
      </ul>
    </div>

    <div class="card">
      <h2>📌 可以看看这些</h2>
      <ul>
        <li>👉 跨境电商入门路径</li>
        <li>👉 TikTok 内容拆解</li>
        <li>👉 春招/社招经验分享</li>
      </ul>
    </div>

    <div class="card">
      <h2>📣 关于公众号</h2>
      <p>
        公众号：<span class="highlight">子卿写作</span><br><br>
        后续内容会优先更新在公众号。<br>
        如果你刚好在做跨境电商 / 想开始写作，可以关注看看。
      </p>
    </div>

    <div class="footer">
      © 2026 子卿写作
    </div>

  </div>

</body>
</html>
